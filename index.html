<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Scripts</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0b15; /* Dark background to pop the purple */
        }

        /* Glass container */
        .glass {
            width: 420px;
            max-width: 92vw;
            padding: 28px 24px 26px;
            border-radius: 22px;
            background: linear-gradient(160deg, #1a1423, #2d1b4e);
            border: 1px solid rgba(134, 70, 180, 0.3);
            color: #f3f3f3;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            font-family: 'Inter', sans-serif;
            position: relative;
            animation: popIn 0.35s ease-out;
            overflow: hidden;
        }

        @keyframes popIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Close cross - color changed to light purple/white for contrast */
        .close-cross {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #d8b4fe; /* Changed color */
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .close-cross:hover {
            color: #fff;
            transform: scale(1.2) rotate(90deg);
        }

        /* LOCKED text color - specific purple accent */
        .locked-status {
            font-size: 1rem;
            color: #a78bfa; /* Soft purple/lavender */
            margin: 1rem 0;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* Info box */
        .info {
            margin: 2rem 0;
            background: rgba(134, 70, 180, 0.1);
            border-radius: 14px;
            padding: 12px 14px;
            text-align: left;
            border: 1px solid rgba(134, 70, 180, 0.2);
        }

        .label {
            font-size: 0.7rem;
            letter-spacing: 1px;
            opacity: 0.6;
            margin-bottom: 4px;
            color: #d8b4fe;
        }

        .value-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .value {
            font-size: 0.9rem;
            font-weight: 600;
            word-break: break-all;
            color: #fff;
        }

        /* Copy Button */
        .copy-btn {
            position: relative;
            background: transparent;
            border: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .copy-btn svg {
            width: 20px;
            height: 20px;
            fill: #8646B4;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #8646B4;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            opacity: 0;
            transition: 0.3s;
        }

        .show-tooltip .tooltip { opacity: 1; }

        /* Hearts animation 💜 */
        .heart-bg::before, .heart-bg::after {
            content: '💜';
            position: absolute;
            font-size: 28px;
            opacity: 0.15;
            animation: floatHearts 6s infinite linear;
        }
        .heart-bg::before { left: 15%; animation-delay: 0s; }
        .heart-bg::after { left: 80%; animation-delay: 3s; }

        @keyframes floatHearts {
            0% { transform: translateY(120%) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-120%) rotate(360deg); opacity: 0; }
        }

        .telegram-btn {
            display: inline-block;
            background: linear-gradient(135deg, #8646B4, #5b2a8a);
            color: #fff !important;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(134, 70, 180, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .logo-img {
            width: 85px;
            filter: drop-shadow(0 0 10px rgba(134, 70, 180, 0.5));
        }
    </style>
</head>
<body>

<div class="glass" id="mainCard">
    <div class="heart-bg"></div>
    <div class="close-cross" onclick="closeCard()">&times;</div>
    
    <div style="margin-top: 1rem;">
        <img src="http://luvscripts.com/logo.svg" alt="Logo" class="logo-img">
    </div>

    <div style="font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; margin-top: 15px;">
        MAGIC SCRIPTS
    </div>

    <div class="locked-status">🔒 LOCKED 🔒</div>

    <div class="info">
        <div class="label">VISITOR UNIQUE ID</div>
        <div class="value-row">
            <div class="value"><%= vid %></div>
            <button class="copy-btn" onclick="copyId('<%= vid %>', this)">
                <svg viewBox="0 0 24 24"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v16h13a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"/></svg>
                <span class="tooltip">Copied!</span>
            </button>
        </div>
    </div>

    <div style="margin: 2.5rem 0 1rem;">
        <a href="https://t.me/magic_scripts" target="_blank" class="telegram-btn">
            🚀 Telegram @magic_scripts
        </a>
    </div>
</div>

<script>
    function copyId(text, btn) {
        navigator.clipboard.writeText(text);
        btn.classList.add('show-tooltip');
        setTimeout(() => btn.classList.remove('show-tooltip'), 1500);
    }

    function closeCard() {
        document.getElementById('mainCard').style.display = 'none';
    }
</script>

</body>
</html>
